name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "comsigan/**"
      - "pyproject.toml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing comsigan $VERSION"

      - name: Skip if version already on PyPI
        id: check
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/comsigan/${{ steps.version.outputs.version }}/json")
          if [ "$CODE" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} is already on PyPI — bump version in pyproject.toml to publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tools
        if: steps.check.outputs.skip != 'true'
        run: pip install build

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
