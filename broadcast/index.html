<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3세대 음방시스템 방송</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <script src="/broadcast-static/js/socket.io.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Pretendard, sans-serif; }
    #playerWrap { position: fixed; inset: 0; background: #000; }
    #ytContainer { position: absolute; inset: 0; width: 100%; height: 100%; }
    #ytContainer iframe, #ytPlayer, #localVideo {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    #ytPlayer { z-index: 2; }
    #localVideo { object-fit: contain; background: #000; }
    #localVideo::-webkit-media-controls-panel {
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.65));
    }
    #endScreen {
      position: fixed; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: #fff; z-index: 20;
    }
    #endScreen.show { display: flex; }
    #endScreen img { width: 100%; height: 100%; object-fit: cover; }
    #endScreen .end-text {
      font-size: clamp(32px, 6vw, 72px);
      font-weight: 800;
      background: linear-gradient(135deg, #3182f6, #6b9fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #nextSongPanel {
      position: fixed;
      right: 0;
      width: clamp(300px, 32vw, 460px);
      z-index: 30;
      color: #fff;
      border-radius: 22px 0 0 22px;
      transform-origin: right center;
      will-change: transform;
      transition:
        transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
        top 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        bottom 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      overflow: hidden;
      border: 1px solid transparent;
      border-right: none;
      box-shadow: none;
    }
    #nextSongPanel.show {
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: -20px 0 56px rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
    #nextSongPanel.mode-next {
      top: clamp(22px, 4vh, 52px);
      bottom: clamp(22px, 4vh, 52px);
      transform: translate3d(100%, 0, 0);
    }
    #nextSongPanel.mode-next.show { transform: translate3d(0, 0, 0); }
    #nextSongPanel.mode-now,
    #nextSongPanel.mode-msg {
      top: 50%;
      bottom: auto;
      transform: translate3d(100%, -50%, 0);
    }
    #nextSongPanel.mode-now.show,
    #nextSongPanel.mode-msg.show { transform: translate3d(0, -50%, 0); }
    #nextSongPanel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f8 48%, #f4f6fa 100%);
      z-index: 0;
    }
    #nextSongPanel:not(.show) {
      pointer-events: none;
    }
    #nextSongPanel.theme-dark::before {
      background: linear-gradient(180deg, #0c1220 0%, #101828 48%, #0a0f18 100%);
    }
    .side-alert-next-body,
    .side-alert-now-body,
    .side-alert-msg-body {
      transition: opacity 0.4s ease, max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      overflow: hidden;
    }
    .side-alert-next-body {
      flex: 1; min-height: 0; display: flex; flex-direction: column;
      max-height: 2000px; opacity: 1;
    }
    .side-alert-now-body,
    .side-alert-msg-body { max-height: 0; opacity: 0; flex-shrink: 0; }
    #nextSongPanel.mode-now .side-alert-next-body,
    #nextSongPanel.mode-msg .side-alert-next-body {
      flex: 0; max-height: 0; opacity: 0; margin: 0; padding: 0;
    }
    #nextSongPanel.mode-now .side-alert-now-body {
      max-height: 120px; opacity: 1; padding-top: 4px;
    }
    #nextSongPanel.mode-now .side-alert-msg-body {
      max-height: 0; opacity: 0; padding: 0;
    }
    #nextSongPanel.mode-msg .side-alert-now-body {
      max-height: 0; opacity: 0; padding: 0;
    }
    #nextSongPanel.mode-msg .side-alert-msg-body {
      max-height: 200px; opacity: 1; padding-top: 4px;
    }
    .next-song-accent {
      position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      border-radius: 22px 0 0 22px;
      background: linear-gradient(180deg, #6b9fff, #3182f6);
      z-index: 2;
    }
    .next-song-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; height: 100%;
      min-height: 0; overflow: hidden;
      padding: clamp(22px, 3vh, 36px) clamp(22px, 2.6vw, 32px) clamp(18px, 2.2vh, 26px);
    }
    .next-song-brand {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: clamp(16px, 2.5vh, 24px); flex-shrink: 0;
      padding: 12px 14px; border-radius: 14px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    .next-song-brand[hidden] { display: none !important; }
    .next-song-brand img {
      width: clamp(44px, 7vw, 64px); height: clamp(44px, 7vw, 64px);
      object-fit: contain; flex-shrink: 0;
    }
    #nextSongPanel.theme-light .alert-logo-tint { filter: brightness(0) !important; }
    #nextSongPanel.theme-dark .alert-logo-tint { filter: brightness(0) invert(1) !important; }
    .next-song-brand-text { font-size: clamp(14px, 1.7vw, 18px); font-weight: 700; color: #1e293b; }
    #nextSongPanel.theme-dark .next-song-brand-text { color: rgba(255,255,255,0.94); }
    .next-song-label {
      display: inline-block; font-size: 11px; font-weight: 800;
      letter-spacing: 0.14em; color: #2563eb; margin-bottom: 6px;
    }
    .next-song-head {
      font-size: clamp(24px, 3vw, 32px); font-weight: 800; line-height: 1.15;
      color: #0f172a;
    }
    #nextSongPanel.theme-dark .next-song-head { color: #fff; }
    .next-song-list {
      list-style: none; margin: 0; padding: 4px 0; flex: 1;
      overflow: hidden; display: flex; flex-direction: column; gap: 10px;
    }
    .next-song-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0, 0, 0, 0.08);
      font-size: clamp(15px, 1.8vw, 20px); font-weight: 600;
      color: #0f172a;
    }
    #nextSongPanel.theme-dark .next-song-item {
      background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); color: #fff;
    }
    .next-song-item--featured {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      padding: 0;
      background: transparent;
      border: none;
    }
    .next-song-card-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    #nextSongPanel.theme-dark .next-song-card-row {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.1);
    }
    .next-song-thumb-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }
    .next-song-thumb {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .next-song-badge {
      flex-shrink: 0; width: 34px; height: 34px; border-radius: 12px;
      background: linear-gradient(145deg, #3182f6, #1b5ec4); color: #fff;
      font-size: 14px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .next-song-title {
      flex: 1; min-width: 0; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .next-song-credit {
      flex-shrink: 0; margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(0,0,0,0.08);
      font-size: 11px; color: rgba(15,23,42,0.45); text-align: center;
    }
    #nextSongPanel.theme-dark .next-song-credit {
      border-top-color: rgba(255,255,255,0.1); color: rgba(255,255,255,0.38);
    }
    .now-playing-line {
      margin: 8px 0 0; font-size: clamp(16px, 1.9vw, 22px);
      font-weight: 700; line-height: 1.4; color: #0f172a;
    }
    #nextSongPanel.theme-dark .now-playing-line,
    #nextSongPanel.theme-dark .side-alert-msg-line { color: #fff; }
    .side-alert-msg-line {
      margin: 8px 0 0;
      font-size: clamp(15px, 1.8vw, 20px);
      font-weight: 700;
      line-height: 1.45;
      color: #0f172a;
    }
    #audioUnlock {
      position: fixed; inset: 0; z-index: 40; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55); color: #fff;
      font-size: clamp(22px, 4vw, 36px); font-weight: 800; cursor: pointer;
      text-align: center; padding: 24px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
      border: 3px solid rgba(49, 130, 246, 0.85);
      animation: unlockPulse 1.4s ease-in-out infinite;
    }
    @keyframes unlockPulse {
      0%, 100% { box-shadow: inset 0 0 0 0 rgba(49, 130, 246, 0.2); }
      50% { box-shadow: inset 0 0 80px 12px rgba(49, 130, 246, 0.35); }
    }
    #audioUnlock.show { display: flex; }
    .playback-error-alert {
      position: fixed;
      top: 40px;
      right: 40px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 280px;
      max-width: 420px;
      padding: 18px 22px;
      background: rgba(12, 16, 24, 0.88);
      border-radius: 20px;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      transform: translate3d(120%, 0, 0);
      transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
      z-index: 31;
      pointer-events: none;
    }
    .playback-error-alert.show {
      transform: translate3d(0, 0, 0);
      pointer-events: auto;
    }
    .playback-error-alert .toast-next-head {
      font-size: 13px; font-weight: 700; margin-bottom: 4px;
    }
    #ytContainer, #ytContainer iframe, #ytPlayer {
      pointer-events: auto;
    }
    .playback-error-alert .error-msg {
      font-size: 15px;
      line-height: 1.5;
      margin: 8px 0 14px;
      opacity: 0.92;
    }
    .playback-error-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .playback-error-actions button {
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .playback-error-actions .btn-cancel {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .playback-error-actions .btn-recover {
      background: #3182f6;
      color: #fff;
    }
    .recovery-progress-wrap {
      margin: 10px 0 4px;
      display: none;
    }
    .recovery-progress-wrap.show { display: block; }
    .recovery-progress-track {
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }
    .recovery-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3182f6, #6b9fff);
      transition: width 0.25s ease;
    }
    .recovery-progress-label {
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.75;
    }
    #externalPlaybackOverlay {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      text-align: center;
      padding: 48px 32px;
    }
    #externalPlaybackOverlay.show { display: flex; }
    .external-playback-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800;
      margin: 0 0 14px;
    }
    .external-playback-hint {
      font-size: clamp(15px, 2vw, 18px);
      line-height: 1.55;
      opacity: 0.88;
      max-width: 520px;
    }
  </style>
</head>
<body>
  <div id="playerWrap">
    <div id="ytContainer"><div id="ytPlayer"></div></div>
    <video id="localVideo" playsinline controls controlsList="nodownload" style="display:none"></video>
  </div>

  <div id="audioUnlock" role="button" tabindex="0">화면을 눌러 방송 소리 켜기</div>

  <div id="endScreen">
    <img id="endImage" alt="" style="display:none" />
    <p class="end-text" id="endText">방송종료입니다</p>
  </div>

  <div id="externalPlaybackOverlay" aria-live="polite">
    <p class="external-playback-title" id="externalPlaybackTitle">YouTube 영상</p>
    <p class="external-playback-hint" id="externalPlaybackHint">
      퍼가기 제한 영상 — 스트림을 불러오는 중입니다.<br />
      잠시 후 방송 화면에서 자동 재생됩니다.
    </p>
  </div>

  <div id="playbackErrorAlert" class="playback-error-alert" aria-live="assertive">
    <p class="toast-next-head">재생 오류</p>
    <p class="error-msg" id="playbackErrorMessage"></p>
    <div class="recovery-progress-wrap" id="recoveryProgressWrap">
      <div class="recovery-progress-track"><div class="recovery-progress-fill" id="recoveryProgressFill"></div></div>
      <p class="recovery-progress-label" id="recoveryProgressLabel"></p>
    </div>
    <div class="playback-error-actions" id="playbackErrorActions">
      <button type="button" class="btn-cancel" id="btnErrorCancel">취소</button>
      <button type="button" class="btn-recover" id="btnErrorRecover">복구</button>
    </div>
  </div>

  <div id="nextSongPanel" class="theme-light mode-next" aria-hidden="true">
    <div class="next-song-accent" aria-hidden="true"></div>
    <div class="next-song-inner">
      <div class="next-song-brand" id="nextSongBrand">
        <img id="nextSongBrandLogo" class="alert-logo-tint" src="/assets/bundled/njbs-logo.png" alt="" />
        <span class="next-song-brand-text" id="nextSongBrandText"></span>
      </div>
      <div class="side-alert-next-body" id="sideAlertNextBody">
        <div class="next-song-section-head">
          <span class="next-song-label">UP NEXT</span>
          <h2 class="next-song-head">다음 곡</h2>
        </div>
        <ul class="next-song-list" id="nextSongList"></ul>
        <p class="next-song-credit">Made by 신재원, 정규환</p>
      </div>
      <div class="side-alert-now-body" id="sideAlertNowBody">
        <span class="next-song-label">NOW PLAYING</span>
        <p class="now-playing-line" id="nowPlayingText"></p>
      </div>
      <div class="side-alert-msg-body" id="sideAlertMsgBody">
        <p class="side-alert-msg-line" id="sideAlertMsgText"></p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      if (typeof io === "undefined") {
        document.body.innerHTML =
          "<p style='color:#fff;padding:24px;font:16px sans-serif'>socket.io 로드 실패 — 앱을 다시 빌드하거나 네트워크를 확인하세요.</p>";
        return;
      }

      var socket = io("/broadcast", {
        transports: ["websocket", "polling"],
        reconnection: true,
        reconnectionAttempts: 20,
      });
      var ORIGIN = window.location.origin;
      var KIOSK_MODE = /(?:\?|&)kiosk=1(?:&|$)/.test(location.search);

      var ytPlayer = null;
      var ytApiReady = false;
      var ytPendingItem = null;
      var endFallbackTimer = null;
      var playlist = [];
      var currentIndex = -1;
      var playbackStatus = "stopped";
      var endImagePath = "";
      var nextAlertSent = false;
      var progressTimer = null;
      var ytPollTimer = null;
      var nextAlertTimer = null;
      var songFinishedSent = false;
      var trackPlayStartedAt = 0;
      var trackDurationSec = 0;
      var currentTrackKey = "";
      var broadcastEndedAck = false;
      /** YouTube는 실제 종료보다 약 1초 일찍 끝나는 경우가 많음 */
      var TRACK_END_EARLY_SEC = 2;
      var endEarlyTimer = null;
      var advanceRetryTimer = null;
      var YT_STATE_ENDED = 0;
      var MIN_PLAY_MS_BEFORE_ADVANCE = 4000;
      var ytErrorRetried = false;
      var streamPlaybackActive = false;
      var streamFallbackRequested = false;
      var ytApiWatchTimer = null;
      var activePlaybackMode = "none";
      var recoveryInProgress = false;
      var lastHeartbeatAt = 0;
      var playbackErrorAlert = document.getElementById("playbackErrorAlert");
      var playbackErrorMessage = document.getElementById("playbackErrorMessage");
      var recoveryProgressWrap = document.getElementById("recoveryProgressWrap");
      var recoveryProgressFill = document.getElementById("recoveryProgressFill");
      var recoveryProgressLabel = document.getElementById("recoveryProgressLabel");
      var playbackErrorActions = document.getElementById("playbackErrorActions");
      var btnErrorCancel = document.getElementById("btnErrorCancel");
      var btnErrorRecover = document.getElementById("btnErrorRecover");

      var localVideo = document.getElementById("localVideo");
      var endScreen = document.getElementById("endScreen");
      var nextSongPanel = document.getElementById("nextSongPanel");
      var nowPlayingText = document.getElementById("nowPlayingText");
      var sideAlertMsgText = document.getElementById("sideAlertMsgText");
      var nextSongList = document.getElementById("nextSongList");
      var nextSongBrand = document.getElementById("nextSongBrand");
      var nextSongBrandLogo = document.getElementById("nextSongBrandLogo");
      var nextSongBrandText = document.getElementById("nextSongBrandText");
      var ytContainer = document.getElementById("ytContainer");
      var audioUnlockEl = document.getElementById("audioUnlock");
      var audioUnlocked = false;
      var toastHideTimer = null;
      var nextAlertLogo = "/assets/bundled/njbs-logo.png";
      var DEFAULT_NEXT_ALERT_TEXT = "\uC911\uB3D9\uC911\uD559\uAD50 \uBC29\uC1A1\uBD80";
      var nextAlertText = DEFAULT_NEXT_ALERT_TEXT;
      var nextAlertTheme = "light";
      var nowPlayingTheme = "light";
      var NEXT_ALERT_MAX_SONGS = 3;
      var NOW_PLAYING_PANEL_MS = 5500;

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s || "";
        return d.innerHTML;
      }

      function getUpcomingSongs(maxCount) {
        var list = [];
        var n = maxCount || NEXT_ALERT_MAX_SONGS;
        for (var i = 1; i <= n; i++) {
          var item = playlist[currentIndex + i];
          if (item) list.push(item);
        }
        return list;
      }

      function assetPublicUrl(path) {
        if (!path) return "";
        if (path.indexOf("http://") === 0 || path.indexOf("https://") === 0) return path;
        return path.indexOf("/") === 0 ? path : "/" + path.replace(/^\/+/, "");
      }

      function applySidePanelTheme() {
        if (!nextSongPanel) return;
        var theme =
          nextSongPanel.classList.contains("mode-now") ? nowPlayingTheme : nextAlertTheme;
        nextSongPanel.classList.remove("theme-dark", "theme-light");
        nextSongPanel.classList.add(theme === "light" ? "theme-light" : "theme-dark");
      }

      function applyAlertThemes(cfg) {
        if (cfg) {
          if (cfg.next_alert_theme !== undefined) {
            nextAlertTheme = cfg.next_alert_theme === "light" ? "light" : "dark";
          }
          if (cfg.now_playing_theme !== undefined) {
            nowPlayingTheme = cfg.now_playing_theme === "light" ? "light" : "dark";
          }
        }
        applySidePanelTheme();
      }

      function applyNextAlertBranding(cfg) {
        if (cfg) {
          if (cfg.next_alert_logo !== undefined) {
            nextAlertLogo = cfg.next_alert_logo || "/assets/bundled/njbs-logo.png";
          }
          if (cfg.next_alert_text !== undefined) {
            var t = (cfg.next_alert_text || "").trim();
            nextAlertText = t || DEFAULT_NEXT_ALERT_TEXT;
          }
          applyAlertThemes(cfg);
        }
        var hasLogo = !!nextAlertLogo;
        var hasText = !!nextAlertText;
        if (nextSongBrand) nextSongBrand.hidden = !hasLogo && !hasText;
        if (nextSongBrandLogo && hasLogo) {
          nextSongBrandLogo.src = assetPublicUrl(nextAlertLogo);
          nextSongBrandLogo.style.display = "";
        }
        if (nextSongBrandText) {
          nextSongBrandText.textContent = nextAlertText;
          nextSongBrandText.hidden = !hasText;
        }
      }

      function setSidePanelMode(mode) {
        if (!nextSongPanel) return;
        nextSongPanel.classList.remove("mode-next", "mode-now", "mode-msg");
        if (mode === "now") nextSongPanel.classList.add("mode-now");
        else if (mode === "msg") nextSongPanel.classList.add("mode-msg");
        else nextSongPanel.classList.add("mode-next");
        applySidePanelTheme();
      }

      function hideNextSongPanel(skipAnim) {
        if (!nextSongPanel) return;
        if (skipAnim || !nextSongPanel.classList.contains("show")) {
          nextSongPanel.classList.remove("show", "mode-now", "mode-msg");
          nextSongPanel.classList.add("mode-next");
          nextSongPanel.setAttribute("aria-hidden", "true");
          return;
        }
        var hideDone = false;
        function finishHide() {
          if (hideDone) return;
          hideDone = true;
          nextSongPanel.classList.remove("mode-now", "mode-msg");
          nextSongPanel.classList.add("mode-next");
          nextSongPanel.setAttribute("aria-hidden", "true");
        }
        var onEnd = function (e) {
          if (e.target !== nextSongPanel || e.propertyName !== "transform") return;
          nextSongPanel.removeEventListener("transitionend", onEnd);
          finishHide();
        };
        nextSongPanel.addEventListener("transitionend", onEnd);
        nextSongPanel.classList.remove("show");
        setTimeout(finishHide, 700);
      }

      function clearAlertTimer() {
        if (toastHideTimer) {
          clearTimeout(toastHideTimer);
          toastHideTimer = null;
        }
      }

      function hideAllAlerts() {
        clearAlertTimer();
        hideNextSongPanel(true);
      }

      function showPanelMessage(msg, duration) {
        duration = duration || 3500;
        if (!nextSongPanel || !sideAlertMsgText) return;
        clearAlertTimer();
        applyNextAlertBranding(null);
        sideAlertMsgText.textContent = msg;
        var keepVisible =
          nextSongPanel.classList.contains("show") &&
          (nextSongPanel.classList.contains("mode-next") ||
            nextSongPanel.classList.contains("mode-now"));
        if (keepVisible) {
          setSidePanelMode("msg");
          nextSongPanel.setAttribute("aria-hidden", "false");
        } else {
          slideInSidePanel("msg");
        }
        toastHideTimer = setTimeout(function () {
          hideNextSongPanel(false);
          toastHideTimer = null;
        }, duration);
      }

      function showToast(msg, duration) {
        showPanelMessage(msg, duration);
      }

      function resolveSongThumbnail(entry) {
        if (!entry || typeof entry === "string") return "";
        var thumb = (entry.thumbnail || "").trim();
        if (thumb) return thumb;
        if (entry.type === "youtube" && entry.id) {
          return "https://i.ytimg.com/vi/" + entry.id + "/mqdefault.jpg";
        }
        return "";
      }

      function buildNextSongListItems(entries) {
        var html = "";
        for (var i = 0; i < entries.length; i++) {
          var title = typeof entries[i] === "string" ? entries[i] : (entries[i].title || "");
          var badge =
            '<span class="next-song-badge">' +
            (i + 1) +
            '</span><span class="next-song-title">' +
            escapeHtml(title) +
            "</span>";
          if (i === 0) {
            var thumb = resolveSongThumbnail(entries[i]);
            if (thumb) {
              html +=
                '<li class="next-song-item next-song-item--featured">' +
                '<div class="next-song-card-row">' +
                badge +
                "</div>" +
                '<div class="next-song-thumb-wrap">' +
                '<img class="next-song-thumb" src="' +
                escapeHtml(thumb) +
                '" alt="" onerror="this.closest(\'.next-song-thumb-wrap\').hidden=true" />' +
                "</div></li>";
              continue;
            }
          }
          html += '<li class="next-song-item">' + badge + "</li>";
        }
        return html;
      }

      function slideInSidePanel(mode) {
        setSidePanelMode(mode);
        nextSongPanel.classList.remove("show");
        void nextSongPanel.offsetWidth;
        nextSongPanel.setAttribute("aria-hidden", "false");
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            nextSongPanel.classList.add("show");
          });
        });
      }

      function showNextSongsPanel(entries) {
        if (!entries || !entries.length || !nextSongPanel || !nextSongList) return;
        clearAlertTimer();
        applyNextAlertBranding(null);
        nextSongList.innerHTML = buildNextSongListItems(
          entries.slice(0, NEXT_ALERT_MAX_SONGS)
        );
        slideInSidePanel("next");
      }

      function showNextSongsAlert() {
        showNextSongsPanel(getUpcomingSongs(NEXT_ALERT_MAX_SONGS));
      }

      function scheduleNowPlayingHide() {
        clearAlertTimer();
        toastHideTimer = setTimeout(function () {
          if (
            nextSongPanel &&
            nextSongPanel.classList.contains("show") &&
            nextSongPanel.classList.contains("mode-now")
          ) {
            hideNextSongPanel(false);
          }
          toastHideTimer = null;
        }, NOW_PLAYING_PANEL_MS);
      }

      function showNowPlayingToast(title, opts) {
        if (!nextSongPanel || !nowPlayingText) return;
        opts = opts || {};
        applyNextAlertBranding(null);
        nowPlayingText.textContent =
          "\u25B6 \uC9C0\uAE08 \uC7AC\uC0DD: " + (title || "");
        var alreadyNow =
          nextSongPanel.classList.contains("show") &&
          nextSongPanel.classList.contains("mode-now");
        var morphFromNext =
          nextSongPanel.classList.contains("show") &&
          nextSongPanel.classList.contains("mode-next");
        if (opts.extend && alreadyNow) {
          nextSongPanel.setAttribute("aria-hidden", "false");
          scheduleNowPlayingHide();
          return;
        }
        if (morphFromNext) {
          setSidePanelMode("now");
          nextSongPanel.setAttribute("aria-hidden", "false");
        } else if (!alreadyNow) {
          slideInSidePanel("now");
        } else {
          nextSongPanel.setAttribute("aria-hidden", "false");
        }
        scheduleNowPlayingHide();
      }

      function hideAlertsForExternalPlayback() {
        if (
          !nextSongPanel ||
          !nextSongPanel.classList.contains("show") ||
          nextSongPanel.classList.contains("mode-now")
        ) {
          return;
        }
        hideNextSongPanel(true);
      }

      function destroyYtPlayer() {
        clearTrackTimers();
        if (ytPlayer && ytPlayer.destroy) {
          try {
            ytPlayer.destroy();
          } catch (e) {}
        }
        ytPlayer = null;
        var holder = document.getElementById("ytPlayer");
        if (holder) holder.innerHTML = "";
      }

      function isYoutubeIframePlaying() {
        if (!ytPlayer || !ytPlayer.getPlayerState) return false;
        try {
          var st = ytPlayer.getPlayerState();
          return st === 1 || st === 3;
        } catch (e) {
          return false;
        }
      }

      function stopAllPlayback() {
        if (ytApiWatchTimer) {
          clearTimeout(ytApiWatchTimer);
          ytApiWatchTimer = null;
        }
        streamFallbackRequested = false;
        streamPlaybackActive = false;
        activePlaybackMode = "none";
        destroyYtPlayer();
        try {
          localVideo.pause();
          localVideo.removeAttribute("src");
          localVideo.load();
        } catch (e) {}
        localVideo.style.display = "none";
        localVideo.muted = true;
      }

      function hidePlayers() {
        clearInterval(ytPollTimer);
        ytPollTimer = null;
        clearTrackTimers();
        stopAllPlayback();
      }

      function reportPlaybackError(code, message, detail) {
        if (code === "stream_failed") return;
        socket.emit("playback_error_report", {
          code: code || "playback",
          message: message || "재생 오류",
          detail: detail || "",
        });
      }

      function emitPlaybackHeartbeat() {
        if (playbackStatus !== "playing" || currentIndex < 0) return;
        var now = Date.now();
        if (now - lastHeartbeatAt < 2800) return;
        lastHeartbeatAt = now;
        socket.emit("playback_heartbeat", {
          index: currentIndex,
          mode: activePlaybackMode,
        });
      }

      function prepareUiForPlayback() {
        hidePlaybackErrorAlert();
        hideExternalPlaybackOverlay();
        if (audioUnlockEl) audioUnlockEl.classList.remove("show");
        if (playbackErrorAlert) playbackErrorAlert.classList.remove("show");
        if (KIOSK_MODE && !audioUnlocked) tryKioskAutounlock();
      }

      function showPlaybackErrorAlert(err) {
        if (!playbackErrorAlert) return;
        hideAllAlerts();
        if (playbackErrorMessage) {
          playbackErrorMessage.textContent = err.message || "재생 오류가 발생했습니다.";
        }
        playbackErrorAlert.classList.add("show");
        if (recoveryProgressWrap) recoveryProgressWrap.classList.remove("show");
        if (playbackErrorActions) playbackErrorActions.style.display = "";
      }

      function hidePlaybackErrorAlert() {
        if (playbackErrorAlert) playbackErrorAlert.classList.remove("show");
        recoveryInProgress = false;
        if (recoveryProgressWrap) recoveryProgressWrap.classList.remove("show");
        if (playbackErrorActions) playbackErrorActions.style.display = "";
      }

      function setRecoveryProgress(percent, step) {
        recoveryInProgress = true;
        if (playbackErrorActions) playbackErrorActions.style.display = "none";
        if (recoveryProgressWrap) recoveryProgressWrap.classList.add("show");
        if (recoveryProgressFill) recoveryProgressFill.style.width = percent + "%";
        if (recoveryProgressLabel) recoveryProgressLabel.textContent = step || "";
      }

      if (btnErrorCancel) {
        btnErrorCancel.addEventListener("click", function () {
          socket.emit("recovery_dismiss");
          hidePlaybackErrorAlert();
        });
      }
      if (btnErrorRecover) {
        btnErrorRecover.addEventListener("click", function () {
          setRecoveryProgress(5, "복구 요청…");
          socket.emit("recovery_request");
        });
      }

      function applyYoutubeQuality(player) {
        if (!player || typeof player.setPlaybackQuality !== "function") return;
        var levels = ["highres", "hd1080", "hd720", "large", "medium"];
        for (var i = 0; i < levels.length; i++) {
          try {
            player.setPlaybackQuality(levels[i]);
            return;
          } catch (e) {}
        }
      }

      function applyVolumeToPlayers() {
        if (!audioUnlocked) return;
        localVideo.muted = false;
        localVideo.volume = 1;
        if (ytPlayer && ytPlayer.unMute) {
          try {
            ytPlayer.unMute();
            ytPlayer.setVolume(100);
            applyYoutubeQuality(ytPlayer);
          } catch (e) {}
        }
      }

      function startPlaybackAfterUnlock() {
        if (playbackStatus === "paused") return;
        if (activePlaybackMode === "youtube" && ytPlayer && ytPlayer.playVideo) {
          try {
            ytPlayer.playVideo();
            applyYoutubeQuality(ytPlayer);
          } catch (e) {}
        } else if (activePlaybackMode === "stream" && localVideo.src) {
          localVideo.play().catch(function () {});
        } else if (activePlaybackMode === "local" && localVideo.src) {
          localVideo.play().catch(function () {});
        }
      }

      function showAudioUnlockOverlay() {
        if (audioUnlocked) return;
        audioUnlockEl.classList.add("show");
      }

      function tryKioskAutounlock() {
        if (audioUnlocked) return;
        if (!KIOSK_MODE) return;
        unlockBroadcastAudio();
      }

      function unlockBroadcastAudio() {
        if (audioUnlocked) {
          applyVolumeToPlayers();
          startPlaybackAfterUnlock();
          return;
        }
        audioUnlocked = true;
        audioUnlockEl.classList.remove("show");
        try {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) {
            var ctx = new Ctx();
            if (ctx.state === "suspended") ctx.resume();
          }
        } catch (e) {}
        applyVolumeToPlayers();
        startPlaybackAfterUnlock();
      }

      function tryAutoplayWithSound() {
        applyVolumeToPlayers();
        if (audioUnlocked && ytPlayer) {
          try {
            ytPlayer.unMute();
            ytPlayer.setVolume(100);
          } catch (e) {}
        }
      }

      audioUnlockEl.addEventListener("click", unlockBroadcastAudio);
      audioUnlockEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") unlockBroadcastAudio();
      });

      function trackKey(item) {
        if (!item) return "";
        return (item.type || "") + ":" + (item.id || item.path || "");
      }

      /** 패널 프로그레스 바와 동일 — 실제 영상 current / duration */
      function getPlaybackProgress() {
        var cur = 0;
        var dur = 0;
        var item = playlist[currentIndex];
        if (!item) return { current: 0, duration: 0 };
        if (streamPlaybackActive && localVideo && localVideo.src) {
          if (isFinite(localVideo.currentTime)) cur = localVideo.currentTime || 0;
          if (isFinite(localVideo.duration)) dur = localVideo.duration || 0;
        } else if (item.type === "youtube" && ytPlayer) {
          if (typeof ytPlayer.getCurrentTime === "function") {
            try {
              cur = ytPlayer.getCurrentTime() || 0;
            } catch (e) {}
          }
          if (typeof ytPlayer.getDuration === "function") {
            try {
              dur = ytPlayer.getDuration() || 0;
            } catch (e) {}
          }
        } else if (localVideo) {
          if (isFinite(localVideo.currentTime)) cur = localVideo.currentTime || 0;
          if (isFinite(localVideo.duration)) dur = localVideo.duration || 0;
        }
        return { current: cur, duration: dur };
      }

      function resolveDuration(item) {
        var p = getPlaybackProgress();
        if (p.duration > 0) return p.duration;
        var d = Number(item && item.duration) || 0;
        if (d > 0) return d;
        if (trackDurationSec > 0) return trackDurationSec;
        return 0;
      }

      function trackRemainingSec(current, duration) {
        if (!duration) return Infinity;
        return Math.max(0, duration - current);
      }

      function shouldFinishTrack(current, duration) {
        if (duration <= 0 || !hasPlayedEnoughToAdvance()) return false;
        if (duration > 10 && current < 3) return false;
        return trackRemainingSec(current, duration) <= TRACK_END_EARLY_SEC;
      }

      function hasPlayedEnoughToAdvance() {
        if (!trackPlayStartedAt) return false;
        return Date.now() - trackPlayStartedAt >= MIN_PLAY_MS_BEFORE_ADVANCE;
      }

      function isYoutubeEnded() {
        if (streamPlaybackActive && localVideo) {
          return !!localVideo.ended;
        }
        if (!ytPlayer || typeof ytPlayer.getPlayerState !== "function") return false;
        try {
          return ytPlayer.getPlayerState() === YT_STATE_ENDED;
        } catch (e) {
          return false;
        }
      }

      function clearAdvanceRetry() {
        if (advanceRetryTimer) {
          clearTimeout(advanceRetryTimer);
          advanceRetryTimer = null;
        }
      }

      function scheduleAdvanceRetry(finishedIndex) {
        clearAdvanceRetry();
        advanceRetryTimer = setTimeout(function () {
          advanceRetryTimer = null;
          if (currentIndex !== finishedIndex || !songFinishedSent) return;
          socket.emit("request_sync", {});
        }, 2500);
      }

      function onTrackEnded() {
        if (streamFallbackRequested && !streamPlaybackActive) return;
        if (songFinishedSent) return;
        if (!hasPlayedEnoughToAdvance()) return;
        if (currentIndex < 0 || playbackStatus === "stopped") return;
        var finishedIndex = currentIndex;
        songFinishedSent = true;
        clearTrackTimers();
        socket.emit("song_finished", { index: finishedIndex });
        scheduleAdvanceRetry(finishedIndex);
      }

      function syncPlaybackProgress() {
        if (streamFallbackRequested && !streamPlaybackActive) return;
        if (currentIndex < 0 || playbackStatus === "stopped" || playbackStatus === "paused") return;
        if (isYoutubeEnded() && hasPlayedEnoughToAdvance()) {
          onTrackEnded();
          return;
        }
        var p = getPlaybackProgress();
        if (p.duration <= 0) return;
        emitProgress(p.current, p.duration);
        checkNextAlert(p.current, p.duration);
        if (shouldFinishTrack(p.current, p.duration)) onTrackEnded();
      }

      function clearTrackTimers() {
        clearTimeout(nextAlertTimer);
        clearTimeout(endEarlyTimer);
        clearTimeout(endFallbackTimer);
        nextAlertTimer = null;
        endEarlyTimer = null;
        endFallbackTimer = null;
      }

      function scheduleTrackTimers(item) {
        clearTrackTimers();
        var dur = resolveDuration(item);
        if (dur > 0) trackDurationSec = dur;
        if (dur > 12 && getUpcomingSongs(1).length) {
          nextAlertTimer = setTimeout(function () {
            if (!songFinishedSent && getUpcomingSongs(1).length) {
              showNextSongsAlert();
            }
          }, Math.max(400, (dur - 10) * 1000));
        }
        if (dur > 5) {
          endFallbackTimer = setTimeout(function () {
            if (!songFinishedSent) onTrackEnded();
          }, (dur + 4) * 1000);
        }
      }

      function beginTrackPlayback(item) {
        currentTrackKey = trackKey(item);
        nextAlertSent = false;
        trackPlayStartedAt = Date.now();
        scheduleTrackTimers(item);
        startYtProgressPoll();
      }

      function onPlayerStateChange(event) {
        if (!event) return;
        if (event.data === YT.PlayerState.ENDED) {
          if (hasPlayedEnoughToAdvance()) onTrackEnded();
          return;
        }
        if (event.data === YT.PlayerState.PLAYING) {
          if (ytApiWatchTimer) {
            clearTimeout(ytApiWatchTimer);
            ytApiWatchTimer = null;
          }
          streamFallbackRequested = false;
          streamPlaybackActive = false;
          activePlaybackMode = "youtube";
          try {
            localVideo.pause();
            localVideo.removeAttribute("src");
            localVideo.style.display = "none";
          } catch (e) {}
          socket.emit("youtube_playing");
          emitPlaybackHeartbeat();
          if (!audioUnlocked) {
            try {
              event.target.pauseVideo();
              event.target.mute();
            } catch (e) {}
            showAudioUnlockOverlay();
            return;
          }
          var item = playlist[currentIndex];
          if (item) {
            trackPlayStartedAt = Date.now();
            var yd = 0;
            try {
              yd = event.target.getDuration() || 0;
            } catch (e) {}
            if (yd > 0) trackDurationSec = yd;
            scheduleTrackTimers(item);
          }
          startYtProgressPoll();
          try {
            event.target.unMute();
            event.target.setVolume(100);
            applyYoutubeQuality(event.target);
          } catch (e) {}
        }
      }

      function onPlayerReady(event) {
        var p = event.target;
        var item = playlist[currentIndex];
        try {
          if (audioUnlocked) {
            p.unMute();
            p.setVolume(100);
            applyYoutubeQuality(p);
            if (playbackStatus !== "paused") p.playVideo();
          } else {
            try {
              p.mute();
            } catch (eMute) {}
            if (playbackStatus !== "paused") {
              try {
                p.playVideo();
              } catch (ePlay) {
                if (item && item.id && p.cueVideoById) p.cueVideoById(item.id);
              }
            } else if (item && item.id && p.cueVideoById) {
              p.cueVideoById(item.id);
            }
            showAudioUnlockOverlay();
          }
          if (item) beginTrackPlayback(item);
          else startYtProgressPoll();
        } catch (e) {
          showAudioUnlockOverlay();
        }
      }

      function scheduleYtApiWatchdog(item) {
        if (ytApiWatchTimer) clearTimeout(ytApiWatchTimer);
        if (!item || item.type !== "youtube") return;
        ytApiWatchTimer = setTimeout(function () {
          ytApiWatchTimer = null;
          if (streamPlaybackActive || streamFallbackRequested) return;
          if (activePlaybackMode === "youtube" && isYoutubeIframePlaying()) return;
          if (ytApiReady && ytPlayer) return;
          requestYoutubeStreamFallback();
        }, 12000);
      }

      function isEmbedRestrictedError(code) {
        return code === 101 || code === 150 || code === 153;
      }

      function setExternalPlaybackOverlayMode(mode) {
        var hint = document.getElementById("externalPlaybackHint");
        if (!hint) return;
        if (mode === "browser") {
          hint.innerHTML =
            "이 영상은 브라우저에서 재생 중입니다.<br />" +
            "재생이 끝나면 자동으로 방송 화면으로 돌아와 다음 곡이 이어집니다.";
        } else {
          hint.innerHTML =
            "퍼가기 제한 영상 — 스트림을 불러오는 중입니다.<br />" +
            "잠시 후 방송 화면에서 자동 재생됩니다.";
        }
      }

      function showExternalPlaybackOverlay(item, mode) {
        setExternalPlaybackOverlayMode(mode || "stream");
        var el = document.getElementById("externalPlaybackOverlay");
        var titleEl = document.getElementById("externalPlaybackTitle");
        if (titleEl) {
          titleEl.textContent =
            (item && item.title) || "YouTube 영상";
        }
        if (el) el.classList.add("show");
        hideAlertsForExternalPlayback();
      }

      function hideExternalPlaybackOverlay() {
        var el = document.getElementById("externalPlaybackOverlay");
        if (el) el.classList.remove("show");
      }

      function requestYoutubeStreamFallback() {
        if (streamPlaybackActive) return;
        if (isYoutubeIframePlaying()) return;
        if (streamFallbackRequested) return;
        var item = playlist[currentIndex];
        if (!item || item.type !== "youtube" || !item.id) return;
        streamFallbackRequested = true;
        clearTrackTimers();
        clearAdvanceRetry();
        stopAllPlayback();
        if (ytContainer) ytContainer.style.display = "none";
        showExternalPlaybackOverlay(item, "stream");
        socket.emit("youtube_embed_blocked", {
          id: item.id,
          index: currentIndex,
          title: item.title || "",
        });
      }

      function playYoutubeStream(data) {
        if (isYoutubeIframePlaying()) {
          streamFallbackRequested = false;
          return;
        }
        stopAllPlayback();
        streamFallbackRequested = false;
        streamPlaybackActive = true;
        activePlaybackMode = "stream";
        prepareUiForPlayback();
        hideExternalPlaybackOverlay();
        if (typeof data.index === "number" && data.index >= 0) {
          currentIndex = data.index;
        }
        var item = playlist[currentIndex];
        if (!item) return;

        songFinishedSent = false;
        ytErrorRetried = false;
        destroyYtPlayer();
        if (ytContainer) ytContainer.style.display = "none";

        var url = data.url || "";
        if (url && url.indexOf("/") === 0) url = ORIGIN + url;

        localVideo.style.display = "block";
        localVideo.controls = false;
        localVideo.removeAttribute("controls");
        localVideo.muted = !audioUnlocked;
        localVideo.volume = 1;
        localVideo.src = url;
        localVideo.load();

        if (data.duration > 0) trackDurationSec = data.duration;
        beginTrackPlayback(item);

        if (audioUnlocked) {
          localVideo.play().then(function () {
            tryAutoplayWithSound();
          }).catch(function () {
            showAudioUnlockOverlay();
          });
        } else {
          showAudioUnlockOverlay();
        }
        showNowPlayingToast(item.title, { extend: true });
      }

      function onPlayerError(event) {
        var code =
          event && typeof event.data === "number" ? event.data : -1;
        if (isEmbedRestrictedError(code)) {
          requestYoutubeStreamFallback();
          return;
        }
        if (streamPlaybackActive || streamFallbackRequested) {
          reportPlaybackError("youtube_error", "YouTube 재생 오류 (코드 " + code + ")");
          return;
        }
        var item = playlist[currentIndex];
        if (item && item.type === "youtube" && !ytErrorRetried) {
          ytErrorRetried = true;
          stopAllPlayback();
          activePlaybackMode = "youtube";
          createYtPlayer(item);
          return;
        }
        reportPlaybackError("youtube_error", "YouTube 재생 오류 — 다음 곡으로 넘깁니다");
        setTimeout(onTrackEnded, 800);
      }

      function createYtPlayer(item) {
        if (!item || !item.id) return;
        var holder = document.getElementById("ytPlayer");
        if (!holder) return;
        destroyYtPlayer();
        holder.innerHTML = "";
        var mountId = "ytMount_" + Date.now();
        holder.innerHTML = '<div id="' + mountId + '"></div>';
        ytPlayer = new YT.Player(mountId, {
          height: "100%",
          width: "100%",
          videoId: item.id,
          playerVars: {
            autoplay: 1,
            mute: audioUnlocked ? 0 : 1,
            controls: 1,
            modestbranding: 1,
            rel: 0,
            playsinline: 1,
            iv_load_policy: 3,
            cc_load_policy: 0,
            fs: 1,
            enablejsapi: 1,
            origin: ORIGIN,
            vq: "hd1080"
          },
          events: {
            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
            onError: onPlayerError
          }
        });
      }

      function tickProgress() {
        var item = playlist[currentIndex];
        var p = getPlaybackProgress();
        if (p.duration <= 0 && item) {
          var probe = resolveDuration(item);
          if (probe > 0) scheduleTrackTimers(item);
        }
        syncPlaybackProgress();
        if (playbackStatus === "playing" && (p.current > 0 || activePlaybackMode === "youtube")) {
          emitPlaybackHeartbeat();
        }
      }

      function startYtProgressPoll() {
        clearInterval(ytPollTimer);
        ytPollTimer = setInterval(tickProgress, 400);
        tickProgress();
      }

      var _prevYtApiReady = window.onYouTubeIframeAPIReady;
      window.onYouTubeIframeAPIReady = function () {
        if (typeof _prevYtApiReady === "function") _prevYtApiReady();
        ytApiReady = true;
        if (ytPendingItem) {
          createYtPlayer(ytPendingItem);
          ytPendingItem = null;
        }
      };

      if (window.YT && window.YT.Player) {
        ytApiReady = true;
      }

      function playYoutube(item) {
        if (!item || !item.id) {
          showToast("유효하지 않은 YouTube 영상 ID");
          reportPlaybackError("invalid_id", "유효하지 않은 YouTube 영상 ID");
          return;
        }
        if (streamPlaybackActive) stopAllPlayback();
        activePlaybackMode = "youtube";
        if (ytContainer) ytContainer.style.display = "block";
        clearAdvanceRetry();
        ytErrorRetried = false;

        if (ytPlayer && ytPlayer.loadVideoById) {
          try {
            if (audioUnlocked) {
              ytPlayer.loadVideoById(item.id);
              beginTrackPlayback(item);
              if (playbackStatus !== "paused") {
                try {
                  ytPlayer.playVideo();
                  applyYoutubeQuality(ytPlayer);
                } catch (e) {}
              }
            } else {
              if (ytPlayer.cueVideoById) ytPlayer.cueVideoById(item.id);
              else ytPlayer.loadVideoById(item.id);
              try {
                ytPlayer.pauseVideo();
                ytPlayer.mute();
              } catch (e) {}
              beginTrackPlayback(item);
              showAudioUnlockOverlay();
            }
            return;
          } catch (e) {}
        }

        destroyYtPlayer();
        if (ytApiReady && window.YT && window.YT.Player) {
          createYtPlayer(item);
        } else {
          ytPendingItem = item;
          scheduleYtApiWatchdog(item);
        }
      }

      function playCurrent() {
        clearInterval(ytPollTimer);
        ytPollTimer = null;
        clearTrackTimers();
        clearAdvanceRetry();
        nextAlertSent = false;
        endScreen.classList.remove("show");
        broadcastEndedAck = false;
        lastHeartbeatAt = 0;
        prepareUiForPlayback();
        streamPlaybackActive = false;
        streamFallbackRequested = false;
        if (ytContainer) ytContainer.style.display = "block";

        var item = playlist[currentIndex];
        if (!item) return;

        if (
          nextSongPanel &&
          nextSongPanel.classList.contains("show") &&
          nextSongPanel.classList.contains("mode-next")
        ) {
          showNowPlayingToast(item.title);
        }

        songFinishedSent = false;
        ytErrorRetried = false;

        if (item.type === "youtube") {
          stopAllPlayback();
          activePlaybackMode = "youtube";
          streamPlaybackActive = false;
          streamFallbackRequested = false;
          localVideo.controls = false;
          localVideo.removeAttribute("controls");
          localVideo.style.display = "none";
          localVideo.pause();
          try {
            localVideo.removeAttribute("src");
          } catch (e) {}
          if (ytContainer) ytContainer.style.display = "block";
          playYoutube(item);
        } else {
          stopAllPlayback();
          activePlaybackMode = "local";
          if (ytContainer) ytContainer.style.display = "none";
          localVideo.style.display = "block";
          localVideo.muted = false;
          localVideo.volume = 1;
          localVideo.src = "/" + (item.path || "uploads/" + item.id);
          localVideo.load();
          beginTrackPlayback(item);
          if (audioUnlocked && playbackStatus !== "paused") {
            localVideo.play().then(function () {
              tryAutoplayWithSound();
            }).catch(function () {
              showAudioUnlockOverlay();
            });
          } else {
            showAudioUnlockOverlay();
          }
        }
        if (audioUnlocked) tryAutoplayWithSound();
        else if (KIOSK_MODE) tryKioskAutounlock();
        else showAudioUnlockOverlay();
      }

      localVideo.addEventListener("ended", function () {
        onTrackEnded();
      });

      localVideo.addEventListener("loadedmetadata", function () {
        var item = playlist[currentIndex];
        if (!item || item.type === "youtube") return;
        if (localVideo.duration > 0) {
          trackDurationSec = localVideo.duration;
          scheduleTrackTimers(item);
        }
      });

      localVideo.addEventListener("timeupdate", function () {
        var item = playlist[currentIndex];
        if (!item) return;
        if (item.type === "youtube" && !streamPlaybackActive) return;
        syncPlaybackProgress();
      });

      function emitProgress(current, duration) {
        if (!duration) return;
        socket.emit("playback_progress", { current: current, duration: duration, index: currentIndex });
      }

      function checkNextAlert(current, duration) {
        if (!duration || !getUpcomingSongs(1).length) return;
        var remain = duration - current;
        if (remain > 11) {
          nextAlertSent = false;
          return;
        }
        if (remain <= 10 && remain > 0.2 && !nextAlertSent) {
          nextAlertSent = true;
          showNextSongsAlert();
        }
      }

      function showEndScreen() {
        hideAllAlerts();
        hidePlayers();
        clearInterval(progressTimer);
        clearInterval(ytPollTimer);
        ytPollTimer = null;
        clearTrackTimers();
        songFinishedSent = true;
        playbackStatus = "stopped";
        broadcastEndedAck = false;
        endScreen.classList.add("show");
        var img = document.getElementById("endImage");
        var text = document.getElementById("endText");
        text.textContent = "방송종료입니다";
        if (endImagePath) {
          img.src = "/" + endImagePath;
          img.style.display = "block";
          text.style.display = "none";
        } else {
          img.style.display = "none";
          text.style.display = "block";
        }
      }

      function showBroadcastEndedLabel() {
        var img = document.getElementById("endImage");
        var text = document.getElementById("endText");
        img.style.display = "none";
        text.style.display = "block";
        text.textContent = "방송종료";
        broadcastEndedAck = true;
      }

      socket.on("state_sync", function (state) {
        playlist = state.playlist || [];
        currentIndex = state.current_index;
        playbackStatus = state.playback_status;
        if (currentIndex >= 0 && playbackStatus !== "stopped") {
          playCurrent();
        }
      });

      socket.on("config", function (cfg) {
        endImagePath = cfg.end_broadcast_image || "";
        applyNextAlertBranding(cfg || {});
      });

      socket.on("playback_seek", function (data) {
        var sec = Math.max(0, Number(data && data.seconds) || 0);
        if (streamPlaybackActive && localVideo) {
          try {
            localVideo.currentTime = sec;
          } catch (e) {}
          return;
        }
        if (ytPlayer && ytPlayer.seekTo) {
          try {
            ytPlayer.seekTo(sec, true);
          } catch (e) {}
        }
      });

      socket.on("youtube_stream_playback", function (data) {
        if (isYoutubeIframePlaying()) return;
        playYoutubeStream(data || {});
      });

      socket.on("playback_error", function (err) {
        showPlaybackErrorAlert(err || {});
      });

      socket.on("playback_error_cleared", function () {
        hidePlaybackErrorAlert();
      });

      socket.on("recovery_progress", function (data) {
        setRecoveryProgress(
          (data && data.percent) || 0,
          (data && data.step) || ""
        );
      });

      socket.on("recovery_finished", function () {
        hidePlaybackErrorAlert();
      });

      socket.on("playback_recover", function (state) {
        hidePlaybackErrorAlert();
        recoveryInProgress = false;
        playlist = (state && state.playlist) || playlist;
        currentIndex =
          state && typeof state.current_index === "number"
            ? state.current_index
            : currentIndex;
        playbackStatus = (state && state.playback_status) || playbackStatus;
        lastHeartbeatAt = 0;
        if (currentIndex < 0 || playbackStatus === "stopped" || playbackStatus === "ended") {
          if (currentIndex < 0) showEndScreen();
          return;
        }
        audioUnlocked = true;
        if (audioUnlockEl) audioUnlockEl.classList.remove("show");
        setTimeout(function () {
          playCurrent();
        }, 120);
      });

      socket.on("youtube_browser_fallback_started", function (data) {
        streamFallbackRequested = true;
        destroyYtPlayer();
        if (ytContainer) ytContainer.style.display = "none";
        localVideo.style.display = "none";
        localVideo.pause();
        var browserItem = playlist[currentIndex];
        if (data && typeof data.index === "number" && data.index >= 0) {
          currentIndex = data.index;
          browserItem = playlist[currentIndex] || browserItem;
        }
        showExternalPlaybackOverlay(browserItem, "browser");
      });

      socket.on("external_playback_done", function () {
        streamFallbackRequested = false;
        streamPlaybackActive = false;
        hideExternalPlaybackOverlay();
        if (ytContainer) ytContainer.style.display = "block";
      });

      socket.on("youtube_stream_failed", function () {
        streamFallbackRequested = false;
        streamPlaybackActive = false;
        activePlaybackMode = "none";
        hideExternalPlaybackOverlay();
        if (ytContainer) ytContainer.style.display = "block";
        showToast("스트림 재생 실패 — 다음 곡으로 넘깁니다");
        setTimeout(onTrackEnded, 800);
      });

      socket.on("load_track", function (state) {
        playlist = state.playlist || [];
        currentIndex = state.current_index;
        playbackStatus = state.playback_status;
        clearAdvanceRetry();

        if (currentIndex < 0 || playbackStatus === "stopped" || playbackStatus === "ended") {
          if (currentIndex < 0) showEndScreen();
          return;
        }
        playCurrent();
      });

      socket.on("playback_status", function (data) {
        playbackStatus = data.status;
        if (playbackStatus === "paused") {
          if (ytPlayer && ytPlayer.pauseVideo) {
            try {
              ytPlayer.pauseVideo();
            } catch (e) {}
          }
          localVideo.pause();
        } else if (playbackStatus === "playing") {
          if (!audioUnlocked) {
            if (KIOSK_MODE) {
              tryKioskAutounlock();
            } else {
              showAudioUnlockOverlay();
              if (ytPlayer && ytPlayer.pauseVideo) {
                try {
                  ytPlayer.pauseVideo();
                } catch (e) {}
              }
              localVideo.pause();
              return;
            }
          }
          if (ytPlayer && ytPlayer.playVideo) {
            try {
              ytPlayer.playVideo();
              applyYoutubeQuality(ytPlayer);
            } catch (e) {}
          }
          applyVolumeToPlayers();
          localVideo.play().then(applyVolumeToPlayers).catch(function () {});
        }
      });

      socket.on("now_playing", function (data) {
        if (typeof data.index === "number") currentIndex = data.index;
      });

      socket.on("broadcast_ended", showEndScreen);

      socket.on("song_added_notify", function (data) {
        showToast("\uD83C\uDFB5 " + data.title + "\uC774(\uAC00) \uD50C\uB808\uC774\uB9AC\uC2A4\uD2B8\uC5D0 \uCD94\uAC00\uB418\uC5C8\uC2B5\uB2C8\uB2E4");
      });

      socket.on("next_song_alert", function () {
        showNextSongsAlert();
      });

      socket.on("now_playing_toast", function (data) {
        showNowPlayingToast(data.title || "");
      });

      function requestBroadcastStop() {
        socket.emit("request_stop");
        playbackStatus = "stopped";
        showEndScreen();
      }

      function handleEscapeKey(e) {
        if (e.key !== "Escape" && e.key !== "Esc") return;
        e.preventDefault();
        e.stopPropagation();
        if (endScreen.classList.contains("show")) {
          if (!broadcastEndedAck) {
            showBroadcastEndedLabel();
            return;
          }
          try {
            window.close();
          } catch (err) {}
          return;
        }
        if (currentIndex >= 0 && playbackStatus !== "stopped" && playbackStatus !== "ended") {
          requestBroadcastStop();
        }
      }

      document.addEventListener("keydown", handleEscapeKey, true);
      window.addEventListener("keydown", handleEscapeKey, true);

      socket.on("connect", function () {
        socket.emit("request_sync");
        if (!audioUnlocked && currentIndex >= 0 && playbackStatus === "playing") {
          if (KIOSK_MODE) tryKioskAutounlock();
          else showAudioUnlockOverlay();
        }
      });

      socket.on("disconnect", function () {
        if (ytApiWatchTimer) {
          clearTimeout(ytApiWatchTimer);
          ytApiWatchTimer = null;
        }
      });

      window.addEventListener("load", function () {
        if (KIOSK_MODE) {
          setTimeout(tryKioskAutounlock, 400);
        } else if (!audioUnlocked && currentIndex >= 0) {
          showAudioUnlockOverlay();
        }
      });
    })();
  </script>
</body>
</html>
